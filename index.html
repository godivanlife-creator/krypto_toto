:root {
  --cream: #fdf6ee;
  --warm: #f2e4cf;
  --brown: #7a4f2e;
  --dark: #2b1a0f;
  --accent: #c8622a;
  --soft: #e8d5bc;
}

body {
  background-color: var(--cream);
  color: var(--dark);
  font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 60px;
  overflow-x: hidden;
}

/* ── Language Switcher ── */
.lang-bar {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 100;
  display: flex;
  gap: 6px;
}

.lang-btn {
  padding: 5px 13px;
  border-radius: 99px;
  border: 1.5px solid rgba(255,255,255,0.35);
  background: rgba(43,26,15,0.55);
  color: rgba(255,255,255,0.75);
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  cursor: pointer;
  backdrop-filter: blur(8px);
  transition: background 0.18s, color 0.18s, transform 0.12s;
  font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
}

.lang-btn:active { transform: scale(0.94); }

.lang-btn.active {
  background: #fff;
  color: var(--accent);
  border-color: #fff;
  font-weight: 600;
}

/* ── Hero ── */
.hero {
  width: 100%;
  background: linear-gradient(160deg, #3a2010 0%, #7a4f2e 60%, #c8622a 100%);
  padding: 56px 24px 80px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

.paw-deco {
  position: absolute;
  font-size: 80px;
  opacity: 0.06;
  top: -10px;
  right: -10px;
  transform: rotate(20deg);
}

.avatar-ring {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 4px solid rgba(255,255,255,0.35);
  margin: 0 auto 18px;
  background: var(--warm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 56px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes popIn {
  from { transform: scale(0.6); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  color: #fff;
  letter-spacing: 0.02em;
  animation: fadeUp 0.5s 0.15s both;
}

.hero .breed-tag {
  display: inline-block;
  margin-top: 8px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.85);
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 14px;
  border-radius: 99px;
  animation: fadeUp 0.5s 0.25s both;
}

@keyframes fadeUp {
  from { transform: translateY(14px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

/* ── Cards ── */
.card-wrap {
  width: 100%;
  max-width: 420px;
  padding: 0 18px;
  margin-top: -36px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.card {
  background: #fff;
  border-radius: 18px;
  padding: 22px;
  box-shadow: 0 2px 16px rgba(122,79,46,0.10);
  animation: fadeUp 0.5s 0.35s both;
}

.card-title {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 14px;
}

.info-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--warm);
}

.info-row:last-child { border-bottom: none; }

.info-icon {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  background: var(--warm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}

.info-label {
  font-size: 0.72rem;
  color: var(--brown);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.info-value {
  font-size: 1rem;
  font-weight: 500;
  color: var(--dark);
}

/* Warning */
.warning-badge {
  background: linear-gradient(135deg, #fff3e0, #ffe0b2);
  border: 1.5px solid #ffb74d;
  border-radius: 14px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: fadeUp 0.5s 0.4s both;
}

.warning-badge .icon { font-size: 2rem; }

.warning-badge .text strong {
  display: block;
  font-size: 1rem;
  color: #e65100;
  font-weight: 600;
  margin-bottom: 2px;
}

.warning-badge .text span {
  font-size: 0.85rem;
  color: #bf360c;
}

/* Buttons */
.actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  animation: fadeUp 0.5s 0.5s both;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px;
  border-radius: 14px;
  font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
  font-size: 1rem;
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
  border: none;
  transition: transform 0.12s, box-shadow 0.12s;
  width: 100%;
}

.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 18px rgba(200,98,42,0.35);
}

.btn-secondary {
  background: var(--dark);
  color: #fff;
  box-shadow: 0 4px 14px rgba(43,26,15,0.22);
}

.btn-outline {
  background: #fff;
  color: var(--dark);
  border: 2px solid var(--soft);
}

.btn-icon { font-size: 1.2rem; }

/* GPS */
.gps-card {
  background: linear-gradient(135deg, #2b1a0f, #7a4f2e);
  border-radius: 18px;
  padding: 22px;
  color: #fff;
  animation: fadeUp 0.5s 0.55s both;
}

.gps-card .card-title { color: rgba(255,255,255,0.6); margin-bottom: 10px; }

.gps-desc {
  font-size: 0.88rem;
  color: rgba(255,255,255,0.75);
  margin-bottom: 16px;
  line-height: 1.6;
}

.btn-gps {
  background: rgba(255,255,255,0.15);
  border: 1.5px solid rgba(255,255,255,0.3);
  color: #fff;
  backdrop-filter: blur(6px);
}

/* Footer */
.footer {
  margin-top: 28px;
  text-align: center;
  font-size: 0.75rem;
  color: var(--brown);
  opacity: 0.6;
  animation: fadeUp 0.5s 0.65s both;
}

.footer span { font-family: 'Playfair Display', serif; font-style: italic; }

/* Lang transition */
.fade-lang { animation: langFade 0.22s ease both; }

@keyframes langFade {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

  </div>

  <script>
    const i18n = {
      zh: {
        warnTitle:        '愛吃東西，請勿餵食',
        warnSub:          '非常感謝您的配合！',
        cardPersonality:  '🐾 狗狗個性',
        labelPersonality: '性格',
        valuePersonality: '親人 · 親狗',
        call1:            '立即撥打聯絡人 1',
        call2:            '立即撥打聯絡人 2',
        gpsTitle:         'GPS 位置回報',
        gpsDesc:          '按下按鈕，系統將自動取得您目前的位置，並以 SMS 簡訊傳送給飼主。',
        gpsBtn:           '一鍵回報位置',
        gpsLoading:       '⏳ 取得位置中…',
        gpsError:         '無法取得位置，請手動聯絡飼主。',
        gpsNoSupport:     '您的裝置不支援定位功能，請手動撥電話通知飼主。',
        gpsSms:           '🐾 Krypto 在這裡！位置：',
        ig:               '追蹤 Krypto 的 Instagram',
        footer:           '每隻毛孩都值得被找到',
      },
      ja: {
        warnTitle:        '食いしん坊です。餌を与えないでください',
        warnSub:          'ご協力ありがとうございます！',
        cardPersonality:  '🐾 性　格',
        labelPersonality: '性格',
        valuePersonality: '人懐っこい · 犬好き',
        call1:            '連絡先 1 に電話する',
        call2:            '連絡先 2 に電話する',
        gpsTitle:         'GPS 位置通報',
        gpsDesc:          'ボタンを押すと現在地を自動取得し、オーナーにSMSで送信します。',
        gpsBtn:           'ワンタップで位置を通報',
        gpsLoading:       '⏳ 位置を取得中…',
        gpsError:         '位置を取得できませんでした。直接お電話ください。',
        gpsNoSupport:     'このデバイスは位置情報に対応していません。お電話でご連絡ください。',
        gpsSms:           '🐾 Krypto はここにいます！場所：',
        ig:               'Krypto の Instagram をフォロー',
        footer:           'すべての子に、帰る場所を',
      },
      en: {
        warnTitle:        'Food motivated — please do not feed',
        warnSub:          'Thank you so much for your help!',
        cardPersonality:  '🐾 Personality',
        labelPersonality: 'Traits',
        valuePersonality: 'Friendly · Gets along with dogs',
        call1:            'Call Contact 1',
        call2:            'Call Contact 2',
        gpsTitle:         'GPS Location Report',
        gpsDesc:          'Tap the button to share your current location with the owner via SMS.',
        gpsBtn:           'Send My Location',
        gpsLoading:       '⏳ Getting location…',
        gpsError:         'Could not get location. Please call the owner directly.',
        gpsNoSupport:     'Geolocation is not supported on this device. Please call the owner.',
        gpsSms:           '🐾 Krypto is here! Location: ',
        ig:               "Follow Krypto on Instagram",
        footer:           'Every pet deserves to find their way home',
      }
    };

    let currentLang = 'zh';

    function applyLang(lang) {
      const t = i18n[lang];
      document.getElementById('t-warn-title').textContent        = t.warnTitle;
      document.getElementById('t-warn-sub').textContent          = t.warnSub;
      document.getElementById('t-card-personality').textContent  = t.cardPersonality;
      document.getElementById('t-label-personality').textContent = t.labelPersonality;
      document.getElementById('t-value-personality').textContent = t.valuePersonality;
      document.getElementById('t-call1').textContent             = t.call1;
      document.getElementById('t-call2').textContent             = t.call2;
      document.getElementById('t-gps-title').textContent         = t.gpsTitle;
      document.getElementById('t-gps-desc').textContent          = t.gpsDesc;
      document.getElementById('t-gps-btn').textContent           = t.gpsBtn;
      document.getElementById('t-ig').textContent                = t.ig;
      document.getElementById('t-footer').textContent            = t.footer;
      document.documentElement.lang = lang === 'zh' ? 'zh-TW' : lang === 'ja' ? 'ja' : 'en';
    }

    function setLang(lang, btnEl) {
      currentLang = lang;
      applyLang(lang);
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btnEl.classList.add('active');
      const wrap = document.getElementById('main-content');
      wrap.classList.remove('fade-lang');
      void wrap.offsetWidth;
      wrap.classList.add('fade-lang');
    }

    applyLang(currentLang);

    function sendGPS() {
      const btn = document.getElementById('gps-btn');
      const t = i18n[currentLang];
      document.getElementById('t-gps-btn').textContent = t.gpsLoading;
      btn.disabled = true;

      if (!navigator.geolocation) {
        alert(t.gpsNoSupport);
        resetGPS();
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude.toFixed(6);
          const lng = pos.coords.longitude.toFixed(6);
          const mapUrl = `https://maps.google.com/?q=${lat},${lng}`;
          const msg = encodeURIComponent(t.gpsSms + mapUrl);
          window.location.href = `sms:0912011282?body=${msg}`;
          resetGPS();
        },
        () => {
          alert(t.gpsError);
          resetGPS();
        },
        { timeout: 10000 }
      );
    }

    function resetGPS() {
      const btn = document.getElementById('gps-btn');
      btn.disabled = false;
      document.getElementById('t-gps-btn').textContent = i18n[currentLang].gpsBtn;
    }
  </script>
